<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>White Knob 设置中心</title><style>:root {color-scheme: dark;--bg: #08090d;--panel: rgba(18, 22, 32, .78);--panel-strong: rgba(24, 29, 42, .92);--line: rgba(255, 255, 255, .12);--text: #f6f7fb;--muted: #9aa4b2;--accent: #65d6ad;--accent-2: #7aa8ff;--warn: #ffd166;--error: #ff8b8b;}* {box-sizing: border-box;-webkit-tap-highlight-color: transparent;}body {margin: 0;min-height: 100vh;color: var(--text);font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;background:radial-gradient(circle at 18% 0, #1d3448 0, transparent 34%),radial-gradient(circle at 92% 10%, #2a2056 0, transparent 30%),linear-gradient(145deg, #07080d, #111827 55%, #06130f);}body::before {content: "";position: fixed;inset: 0;background: linear-gradient(120deg, rgba(255,255,255,.08), transparent 28%, rgba(255,255,255,.04));pointer-events: none;}main {width: min(460px, 100%);margin: 0 auto;padding: 22px 16px 34px;position: relative;animation: rise .38s ease-out;}@keyframes rise {from { opacity: 0; transform: translateY(10px); }to { opacity: 1; transform: none; }}.hero {padding: 8px 4px 16px;}.eyebrow {font-size: 12px;letter-spacing: .08em;color: var(--accent);text-transform: uppercase;}h1 {font-size: 30px;line-height: 1.08;margin: 8px 0;}.hero p {margin: 0;color: var(--muted);font-size: 14px;}.tabs {display: grid;grid-template-columns: repeat(3, 1fr);gap: 8px;padding: 6px;margin: 4px 0 14px;border: 1px solid var(--line);border-radius: 18px;background: rgba(255, 255, 255, .06);backdrop-filter: blur(18px);}.tab {margin: 0;padding: 11px 8px;border: 0;border-radius: 13px;background: transparent;color: var(--muted);font-weight: 700;font-size: 14px;box-shadow: none;}.tab.active {color: #07110f;background: linear-gradient(135deg, var(--accent), #47c49e);box-shadow: 0 10px 26px rgba(101, 214, 173, .22);}.panel {display: none;background: var(--panel);border: 1px solid var(--line);border-radius: 22px;padding: 18px;box-shadow: 0 22px 60px rgba(0, 0, 0, .35);backdrop-filter: blur(18px);}.panel.active {display: block;}.head {display: flex;justify-content: space-between;gap: 12px;align-items: flex-start;margin-bottom: 14px;}h2 {font-size: 19px;margin: 0;}.tag {font-size: 12px;color: #c8d1dc;border: 1px solid var(--line);border-radius: 999px;padding: 5px 9px;background: rgba(255, 255, 255, .06);white-space: nowrap;}label {display: block;margin-top: 11px;color: #dbe2ea;font-size: 14px;}input, select, button {width: 100%;box-sizing: border-box;margin: 7px 0;padding: 13px 14px;border-radius: 14px;border: 1px solid var(--line);font: inherit;font-size: 16px;}input, select {background: rgba(255, 255, 255, .08);color: var(--text);outline: none;}select option {background: #111827;color: #fff;}input:focus, select:focus {border-color: rgba(101, 214, 173, .72);box-shadow: 0 0 0 3px rgba(101, 214, 173, .14);}input[type=file] {color: var(--muted);}input[type=file]::file-selector-button {border: 0;border-radius: 11px;background: #eef2ff;color: #111827;padding: 10px 12px;margin-right: 10px;}input[type=color] {height: 48px;padding: 5px;}input[type=range] {accent-color: var(--accent);padding: 0;border: 0;background: transparent;}button {border: 0;background: linear-gradient(135deg, var(--accent), #3fbf98);color: #06130f;font-weight: 750;box-shadow: 0 10px 24px rgba(101, 214, 173, .22);cursor: pointer;transition: transform .16s ease, opacity .16s ease;}button.secondary {background: linear-gradient(135deg, var(--accent-2), #8f7dff);color: #fff;box-shadow: 0 10px 24px rgba(122, 168, 255, .22);}button.ghost {background: rgba(255,255,255,.08);color: var(--text);border: 1px solid var(--line);box-shadow: none;}button:active {transform: scale(.985);}button:disabled {opacity: .52;cursor: wait;transform: none;}.row {display: grid;grid-template-columns: 1fr 1fr;gap: 11px;}.actions {display: grid;grid-template-columns: 1fr 1fr;gap: 11px;margin-top: 10px;}.check {display: flex;align-items: center;gap: 10px;margin: 8px 0 12px;}.check input {width: 22px;height: 22px;margin: 0;accent-color: var(--accent);}.ssid-row {display: grid;grid-template-columns: 1fr 104px;gap: 10px;align-items: center;}.password-row {position: relative;}.password-row input {padding-right: 54px;}.toggle-pwd {position: absolute;right: 8px;top: 7px;width: 42px;height: 42px;margin: 0;padding: 0;border-radius: 12px;}.wifi-list-container {display: none;max-height: 210px;overflow: auto;margin-top: 9px;border: 1px solid var(--line);border-radius: 16px;background: rgba(0, 0, 0, .18);}.wifi-list {list-style: none;margin: 0;padding: 0;}.wifi-list li {display: flex;align-items: center;justify-content: space-between;gap: 12px;padding: 12px 14px;border-bottom: 1px solid rgba(255,255,255,.08);cursor: pointer;}.wifi-list li:last-child {border-bottom: 0;}.wifi-list li:active {background: rgba(101, 214, 173, .12);}.wifi-ssid {color: var(--text);word-break: break-all;}.wifi-signal, .empty-list, .hint {color: var(--muted);font-size: 13px;}.status {min-height: 24px;margin: 11px 0 0;padding: 12px 13px;border-radius: 14px;color: #dbe2ea;background: rgba(255,255,255,.07);word-break: break-word;font-size: 14px;}.status.success { color: #c6f6d5; }.status.warning { color: var(--warn); }.status.error { color: var(--error); }canvas {display: block;width: 240px;height: 240px;margin: 16px auto;background: #000;border-radius: 50%;border: 1px solid rgba(255, 255, 255, .18);box-shadow: 0 16px 45px rgba(0,0,0,.42);}.loader {display: inline-block;width: 16px;height: 16px;border: 2px solid rgba(255,255,255,.28);border-top-color: #fff;border-radius: 50%;vertical-align: -3px;animation: spin .8s linear infinite;}@keyframes spin {to { transform: rotate(360deg); }}@media (max-width: 390px) {main { padding: 18px 12px 28px; }h1 { font-size: 26px; }.panel { padding: 15px; border-radius: 19px; }.row, .actions, .ssid-row { grid-template-columns: 1fr; }canvas { width: 220px; height: 220px; }}@media (prefers-reduced-motion: reduce) {main { animation: none; }button { transition: none; }.loader { animation: none; }}</style></head><body><main><div class="hero"><div class="eyebrow">White Knob Studio</div><h1>旋钮设置中心</h1><p id="deviceIp">AP模式 · 配网、照片与灯效</p></div><nav class="tabs" aria-label="页面切换"><button class="tab active" type="button" data-tab="wifi">WiFi配网</button><button class="tab" type="button" data-tab="photo">时间照片</button><button class="tab" type="button" data-tab="light">灯光设置</button></nav><section class="panel active" id="wifiPanel"><div class="head"><h2>WiFi配网</h2><span class="tag">WebSocket</span></div><form id="wifiForm"><label>WiFi名称（SSID）</label><div class="ssid-row"><input type="text" id="ssid" name="ssid" autocomplete="off" placeholder="例如：MyHome_5G" required><button type="button" id="scanWifiBtn" class="ghost">扫描</button></div><div id="wifiListContainer" class="wifi-list-container"><ul id="wifiList" class="wifi-list"></ul></div><div class="hint">点击扫描结果可自动填入，也可以手动输入。</div><label>WiFi密码</label><div class="password-row"><input type="password" id="password" name="password" placeholder="请输入WiFi密码" autocomplete="off"><button type="button" class="ghost toggle-pwd" id="togglePwdBtn" aria-label="显示密码">显</button></div><button type="submit" id="submitBtn">连接并配置</button></form><p class="status" id="statusMessage">已打开配置页，请先扫描或输入 WiFi 信息。</p></section><section class="panel" id="photoPanel"><div class="head"><h2>时间界面照片</h2><span class="tag">240 x 240</span></div><input id="file" type="file" accept="image/*"><canvas id="preview" width="240" height="240"></canvas><button id="upload" type="button">上传照片</button><p id="msg" class="status"></p></section><section class="panel" id="lightPanel"><div class="head"><h2>灯光自定义</h2><span class="tag">WS2812</span></div><label class="check"><input id="lightOn" type="checkbox">启用灯光</label><label>模式<select id="lightMode"><option value="1">纯色</option><option value="4">呼吸</option><option value="5">流星</option><option value="2">渐变</option><option value="0">彩虹</option></select></label><div class="row"><label>颜色<input id="lightColor" type="color" value="#2ec5ce"></label><label>方向<select id="lightDir"><option value="0">正向</option><option value="1">反向</option></select></label></div><label>亮度 <span id="brText">255</span><input id="lightBrightness" type="range" min="0" max="255" value="255"></label><label>速度 <span id="spText">10</span><input id="lightSpeed" type="range" min="0" max="100" value="10"></label><div class="actions"><button id="lightPreview" type="button" class="secondary">预览</button><button id="lightSave" type="button">保存</button></div><p id="lightMsg" class="status"></p></section></main><script>(function() {const tabs = Array.from(document.querySelectorAll('.tab'));const panels = {wifi: document.getElementById('wifiPanel'),photo: document.getElementById('photoPanel'),light: document.getElementById('lightPanel')};function showTab(name) {tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.tab === name));Object.keys(panels).forEach(key => panels[key].classList.toggle('active', key === name));if (name === 'light') loadLight();}tabs.forEach(tab => tab.addEventListener('click', () => showTab(tab.dataset.tab)));const ssidInput = document.getElementById('ssid');const passwordInput = document.getElementById('password');const submitBtn = document.getElementById('submitBtn');const statusDiv = document.getElementById('statusMessage');const scanBtn = document.getElementById('scanWifiBtn');const togglePwdBtn = document.getElementById('togglePwdBtn');const wifiForm = document.getElementById('wifiForm');const wifiListContainer = document.getElementById('wifiListContainer');const wifiListUl = document.getElementById('wifiList');let ws = null;let isConnected = false;let wsConnectAttempt = 0;const MAX_RECONNECT = 3;let configSent = false;function setStatus(message, type) {statusDiv.textContent = message;statusDiv.classList.remove('success', 'warning', 'error');if (type) statusDiv.classList.add(type);}function setLoading(isLoading, text) {submitBtn.disabled = isLoading;submitBtn.innerHTML = isLoading ? '<span class="loader"></span> ' + (text || '配置中...') : '连接并配置';}function showWifiList(show) {wifiListContainer.style.display = show ? 'block' : 'none';}function renderWifiList(networks) {wifiListUl.innerHTML = '';if (!Array.isArray(networks) || networks.length === 0) {const emptyItem = document.createElement('li');emptyItem.className = 'empty-list';emptyItem.textContent = '暂无可用网络，请手动输入或重新扫描';emptyItem.style.cursor = 'default';wifiListUl.appendChild(emptyItem);showWifiList(true);return;}const uniqueMap = new Map();networks.forEach(net => {if (net.ssid && net.ssid.trim()) {const ssid = net.ssid.trim();if (!uniqueMap.has(ssid) || (net.rssi > (uniqueMap.get(ssid).rssi || -100))) {uniqueMap.set(ssid, net);}}});const sorted = Array.from(uniqueMap.values()).sort((a, b) => (b.rssi || -100) - (a.rssi || -100));sorted.forEach(net => {const li = document.createElement('li');const ssidSpan = document.createElement('span');ssidSpan.className = 'wifi-ssid';ssidSpan.textContent = net.ssid.trim();const signalSpan = document.createElement('span');signalSpan.className = 'wifi-signal';if (net.rssi !== undefined) {signalSpan.textContent = net.rssi > -55 ? '强' : (net.rssi > -75 ? '中' : '弱');}li.appendChild(ssidSpan);li.appendChild(signalSpan);li.addEventListener('click', () => {ssidInput.value = net.ssid.trim();showWifiList(false);});wifiListUl.appendChild(li);});showWifiList(true);}function clearWifiList() {wifiListUl.innerHTML = '';showWifiList(false);}function connectWebSocket() {ws = new WebSocket('ws://' + location.host + '/ws');ws.onopen = function() {isConnected = true;wsConnectAttempt = 0;configSent = false;setStatus('已连接设备，可扫描或配置 WiFi。', 'success');if (submitBtn.disabled && submitBtn.textContent.indexOf('已发送配置') >= 0) {submitBtn.disabled = false;submitBtn.textContent = '连接并配置';}};ws.onmessage = function(event) {try {const data = JSON.parse(event.data);if (Array.isArray(data)) {renderWifiList(data);setStatus('扫描到 ' + data.length + ' 个 WiFi 网络，点击列表选择。', 'success');scanBtn.disabled = false;scanBtn.textContent = '扫描';}else if (data.status === 'connected') {setStatus('WiFi 连接成功，设备已接入网络。', 'success');submitBtn.disabled = true;submitBtn.textContent = '连接成功';}} catch (e) {console.log('WebSocket message parse failed', e);}};ws.onerror = function() {isConnected = false;setStatus('WebSocket 连接错误，请刷新页面重试。', 'error');};ws.onclose = function() {isConnected = false;if (configSent) {setStatus('WiFi 配置已发送，设备正在连接。页面断开是正常现象。', 'success');submitBtn.disabled = true;submitBtn.textContent = '已发送配置';}else if (wsConnectAttempt < MAX_RECONNECT && !submitBtn.disabled) {wsConnectAttempt++;setStatus('WebSocket 断开，正在重连 ' + wsConnectAttempt + '/' + MAX_RECONNECT + '。', 'warning');setTimeout(connectWebSocket, 2000);}else if (!configSent) {setStatus('WebSocket 连接失败，请确认仍连接设备热点并刷新页面。', 'error');submitBtn.disabled = false;submitBtn.textContent = '连接并配置';}};}function scanNetworks() {if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {setStatus('WebSocket 未连接，请稍后再试或刷新页面。', 'error');return;}scanBtn.disabled = true;scanBtn.textContent = '扫描中';setStatus('正在扫描附近 WiFi，请稍候。');clearWifiList();try {ws.send(JSON.stringify({scan: 'start'}));} catch (err) {setStatus('发送扫描请求失败，请检查网络。', 'error');scanBtn.disabled = false;scanBtn.textContent = '扫描';}}function sendWiFiConfig(ssid, password) {if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {setStatus('WebSocket 未连接，无法发送配置。', 'error');return false;}try {ws.send(JSON.stringify({ssid: ssid.trim(), password: password}));configSent = true;return true;} catch (err) {setStatus('发送配置失败，请重试。', 'error');return false;}}function onFormSubmit(e) {e.preventDefault();const ssid = ssidInput.value;const password = passwordInput.value;if (!ssid || ssid.trim() === '') {setStatus('请填写 WiFi 名称（SSID）。', 'error');return;}if (ssid.length > 32) {setStatus('SSID 长度不能超过 32 个字符。', 'error');return;}if (password.length > 63) {setStatus('密码长度不能超过 63 个字符。', 'error');return;}setLoading(true, '正在发送配置...');setStatus('正在向 ESP32 发送 WiFi 配置。');if (sendWiFiConfig(ssid, password)) {setStatus('配置已发送，设备正在尝试连接 WiFi。', 'success');submitBtn.disabled = true;setTimeout(() => {if (ws && ws.readyState === WebSocket.OPEN && configSent) {configSent = false;setLoading(false);setStatus('设备暂未响应，请检查 WiFi 密码和信号强度。', 'warning');}}, 8000);}else {setLoading(false);}}function togglePasswordVisibility() {const nextType = passwordInput.type === 'password' ? 'text' : 'password';passwordInput.type = nextType;togglePwdBtn.textContent = nextType === 'password' ? '显' : '隐';}function displayDeviceIP() {const host = location.hostname;if (host && host !== 'localhost') {document.getElementById('deviceIp').textContent = '配置地址：' + host + ' · AP 模式';}}const W = 240, H = 240, SIZE = W * H * 2;const file = document.getElementById('file');const canvas = document.getElementById('preview');const ctx = canvas.getContext('2d');const upload = document.getElementById('upload');const msg = document.getElementById('msg');let bin = null;function say(text, type) {msg.textContent = text;msg.classList.remove('success', 'warning', 'error');if (type) msg.classList.add(type);}function convert() {const d = ctx.getImageData(0, 0, W, H).data;const out = new Uint8Array(SIZE);for (let i = 0, j = 0; i < d.length; i += 4) {const a = d[i + 3] / 255;const r = Math.round(d[i] * a);const g = Math.round(d[i + 1] * a);const b = Math.round(d[i + 2] * a);const c = ((r & 248) << 8) | ((g & 252) << 3) | (b >> 3);out[j++] = c >> 8;out[j++] = c & 255;}bin = out;say('已就绪：' + SIZE + ' 字节 RGB565。', 'success');}file.onchange = function() {const f = file.files[0];if (!f) return;const url = URL.createObjectURL(f);const img = new Image();img.onload = function() {ctx.fillStyle = '#000';ctx.fillRect(0, 0, W, H);const scale = Math.max(W / img.width, H / img.height);const sw = W / scale, sh = H / scale;const sx = (img.width - sw) / 2, sy = (img.height - sh) / 2;ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, H);URL.revokeObjectURL(url);convert();};img.onerror = function() {URL.revokeObjectURL(url);say('图片加载失败。', 'error');};img.src = url;};upload.onclick = async function() {if (!bin) {say('请先选择图片。', 'warning');return;}upload.disabled = true;say('上传中...');try {const res = await fetch('/upload_time_bg', {method: 'POST', headers: {'Content-Type': 'application/octet-stream'}, body: bin});const text = await res.text();say(res.ok ? '已保存。' : text, res.ok ? 'success' : 'error');} catch (e) {say('上传失败。', 'error');}upload.disabled = false;};const lightOn = document.getElementById('lightOn');const lightMode = document.getElementById('lightMode');const lightColor = document.getElementById('lightColor');const lightDir = document.getElementById('lightDir');const lightBrightness = document.getElementById('lightBrightness');const lightSpeed = document.getElementById('lightSpeed');const brText = document.getElementById('brText');const spText = document.getElementById('spText');const lightPreview = document.getElementById('lightPreview');const lightSave = document.getElementById('lightSave');const lightMsg = document.getElementById('lightMsg');function lightSay(text, type) {lightMsg.textContent = text;lightMsg.classList.remove('success', 'warning', 'error');if (type) lightMsg.classList.add(type);}function clamp(v, min, max) {v = Number(v);return Math.max(min, Math.min(max, isNaN(v) ? min : v));}function hex2rgb(hex) {const n = parseInt(hex.slice(1), 16);return {r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255};}function rgb2hex(r, g, b) {return '#' + [r, g, b].map(v => clamp(v, 0, 255).toString(16).padStart(2, '0')).join('');}function updateLightText() {brText.textContent = lightBrightness.value;spText.textContent = lightSpeed.value;}function lightPayload() {const c = hex2rgb(lightColor.value);return {enabled: lightOn.checked,mode: +lightMode.value,direction: +lightDir.value,brightness: +lightBrightness.value,speed: +lightSpeed.value,r: c.r,g: c.g,b: c.b};}async function sendLight(path) {lightPreview.disabled = true;lightSave.disabled = true;lightSay(path.indexOf('preview') >= 0 ? '预览中...' : '保存中...');try {const res = await fetch(path, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(lightPayload())});const text = await res.text();lightSay(res.ok ? (path.indexOf('preview') >= 0 ? '已预览。' : '已保存。') : text, res.ok ? 'success' : 'error');} catch (e) {lightSay('灯光请求失败。', 'error');}lightPreview.disabled = false;lightSave.disabled = false;}async function loadLight() {try {const res = await fetch('/light_config');if (!res.ok) return;const c = await res.json();lightOn.checked = !!c.enabled;lightMode.value = String(c.mode);lightDir.value = String(c.direction);lightBrightness.value = c.brightness;lightSpeed.value = c.speed;lightColor.value = rgb2hex(c.r, c.g, c.b);updateLightText();} catch (e) {}}function init() {displayDeviceIP();connectWebSocket();updateLightText();loadLight();wifiForm.addEventListener('submit', onFormSubmit);scanBtn.addEventListener('click', scanNetworks);togglePwdBtn.addEventListener('click', togglePasswordVisibility);lightBrightness.addEventListener('input', updateLightText);lightSpeed.addEventListener('input', updateLightText);lightPreview.addEventListener('click', () => sendLight('/light_preview'));lightSave.addEventListener('click', () => sendLight('/light_config'));document.addEventListener('click', function(e) {if (!wifiListContainer.contains(e.target) && e.target !== ssidInput && e.target !== scanBtn) {showWifiList(false);}});ssidInput.addEventListener('focus', function() {if (wifiListUl.children.length > 0) showWifiList(true);});}init();})();</script></body></html>
